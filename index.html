<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handheld Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="brand">CASIOD</div>
        <div class="display" id="display">0</div>
        
        <div class="buttons">
            <!-- Row 1 -->
            <button class="btn clear" onclick="clearDisplay()">C/CE</button>
            <button class="btn" onclick="toggleSign()">+/-</button>
            <button class="btn" onclick="squareRoot()">&radic;</button>
            <button class="btn" onclick="setOperator('%')">%</button>

            <!-- Row 2 -->
            <button class="btn" onclick="memoryRecall()">MRC</button>
            <button class="btn" onclick="memoryMinus()">M-</button>
            <button class="btn" onclick="memoryPlus()">M+</button>
            <button class="btn operator" onclick="setOperator('÷')">÷</button>

            <!-- Row 3 -->
            <button class="btn" onclick="appendNumber('7')">7</button>
            <button class="btn" onclick="appendNumber('8')">8</button>
            <button class="btn" onclick="appendNumber('9')">9</button>
            <button class="btn operator" onclick="setOperator('×')">×</button>

            <!-- Row 4 -->
            <button class="btn" onclick="appendNumber('4')">4</button>
            <button class="btn" onclick="appendNumber('5')">5</button>
            <button class="btn" onclick="appendNumber('6')">6</button>
            <button class="btn operator" onclick="setOperator('-')">-</button>

            <!-- Row 5 -->
            <button class="btn" onclick="appendNumber('1')">1</button>
            <button class="btn" onclick="appendNumber('2')">2</button>
            <button class="btn" onclick="appendNumber('3')">3</button>
            <button class="btn operator plus-btn" onclick="setOperator('+')">+</button>

            <!-- Row 6 -->
            <button class="btn" onclick="appendNumber('0')">0</button>
            <button class="btn" onclick="appendNumber('.')">.</button>
            <button class="btn" onclick="calculate()">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
